<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proposal hub</title>
<link rel="icon" type="image/png" href="assets/prota-favicon-large.png">
<style>
  :root{
    /* BRAND-NEUTRAL defaults. The engine overrides these from HUB.agency.tokens
       (root.style.setProperty) at load; a pitch never edits them here. Platform-
       faithful colours (--li/--fb/--ig, and the Google/Trustpilot/Facebook hex in
       the rules below) are chassis constants, NOT brand. See the v2 decision file. */
    --accent:#4f46e5; --accent-strong:#4338ca; --accent-soft:#e7e7fb;
    --ink:#111114; --ink-2:#1c1c22; --sidebar:#111114;
    --ink-muted:rgba(17,17,20,.56); --bg:#f7f7f5; --bg-alt:#ededea; --hairline:rgba(17,17,20,.12);
    --on-dark:#f7f7f5;
    --li:#0a66c2; --fb:#1877f2; --ig:#c9367f;
    --font-display:Georgia,'Times New Roman',serif; --font-body:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--ink);background:var(--bg);
    display:grid;grid-template-columns:272px 1fr;height:100vh;overflow:hidden}

  /* ---------- Sidebar ---------- */
  .sidebar{background:var(--sidebar);color:#fff;display:flex;flex-direction:column;
    border-right:1px solid #26262e;overflow-y:auto}
  .hub-brand{display:flex;align-items:center;gap:.7rem;padding:1.4rem 1.25rem;border-bottom:1px solid #26262e}
  .hub-brand img{height:34px;filter:brightness(0) invert(1);opacity:.95}
  .hub-brand b{display:block;font-size:.95rem;line-height:1.1}
  .hub-brand span{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .hub-nav{padding:1rem .75rem}
  .hub-section{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#7b7b86;font-weight:700;padding:1.1rem .6rem .4rem}
  .hub-section:first-child{padding-top:.3rem}
  .hub-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:8px;color:#d6d6dd;
    font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;border-left:3px solid transparent;transition:background .15s,color .15s}
  .hub-item:hover{background:#22222a;color:#fff}
  .hub-item.active{background:#22222a;color:#fff;border-left-color:var(--accent)}
  .hub-item .ic{width:16px;height:16px;flex-shrink:0;opacity:.85}
  .hub-item.disabled{color:#5a5a64;cursor:default}
  .hub-item.disabled:hover{background:transparent;color:#5a5a64}
  .hub-item .badge{margin-left:auto;font-size:.62rem;letter-spacing:.03em;color:#fff;background:var(--accent-strong);padding:.1rem .42rem;border-radius:999px;font-weight:700}
  .hub-item .soon{margin-left:auto;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:#6b6b75;background:#26262e;padding:.15rem .45rem;border-radius:999px;font-weight:700}
  .sidebar__foot{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid #26262e;font-size:.7rem;color:#6b6b75;line-height:1.5}

  /* ---------- Main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;height:100vh}
  .toolbar{display:flex;align-items:center;gap:1rem;padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid var(--hairline);flex-shrink:0}
  .tb-title{font-weight:700;color:var(--ink);font-size:.98rem}
  .tb-sub{color:var(--ink-muted);font-size:.82rem;margin-left:.25rem}
  .tb-open{margin-left:auto;font-size:.82rem;font-weight:700;color:var(--accent-strong);text-decoration:none;border:1px solid var(--hairline);padding:.45rem .8rem;border-radius:7px;background:#fff}
  .tb-open:hover{border-color:var(--accent);color:var(--ink)}
  .tb-badge{font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:#fff;background:var(--accent);padding:.2rem .5rem;border-radius:999px;margin-left:-.5rem}
  .tb-btn{font-size:.82rem;font-weight:700;color:#fff;background:var(--ink);border:0;padding:.45rem .85rem;border-radius:7px;cursor:pointer;white-space:nowrap}
  .tb-btn:hover{background:var(--accent-strong)}
  /* site prototype side pane */
  .sitepane-overlay{position:fixed;inset:0;background:rgba(11,11,12,.42);opacity:0;pointer-events:none;transition:opacity .25s;z-index:120}
  .sitepane-overlay.open{opacity:1;pointer-events:auto}
  .sitepane{position:fixed;top:0;right:0;height:100%;width:min(460px,92vw);background:var(--bg);border-left:1px solid var(--hairline);box-shadow:-30px 0 70px -30px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:121;display:flex;flex-direction:column}
  .sitepane.open{transform:translateX(0)}
  .sitepane__top{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:1px solid var(--hairline)}
  .sitepane__top b{font-family:var(--font-display);font-size:1.15rem;color:var(--ink);font-weight:400}
  .sitepane__x{background:none;border:0;font-size:1.5rem;line-height:1;color:var(--ink-muted);cursor:pointer;padding:.2rem}
  .sitepane__x:hover{color:var(--ink)}
  .sitepane__body{padding:1.4rem;overflow:auto}
  .sitepane__lede{font-size:.95rem;line-height:1.55;color:var(--ink);margin-bottom:.5rem}
  .sitepane__note{font-size:.82rem;line-height:1.5;color:var(--ink-muted);margin-bottom:1.3rem;padding-bottom:1.3rem;border-bottom:1px solid var(--hairline)}
  .sitepane__h{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:.9rem}
  .sp-point{margin-bottom:1rem}
  .sp-point b{display:block;font-size:.9rem;color:var(--ink);margin-bottom:.2rem}
  .sp-point span{display:block;font-size:.86rem;line-height:1.55;color:var(--ink-muted)}
  .sitepane__kicker{margin-top:.4rem;font-size:.9rem;line-height:1.55;color:var(--ink);font-weight:500;border-left:2px solid var(--accent);padding-left:.9rem}
  .view{flex:1;min-height:0;overflow:auto}
  .view[hidden]{display:none}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff}

  /* ---------- Cluster view ---------- */
  .cluster{padding:2.25rem 2.5rem 3rem;max-width:1280px;margin:0 auto}
  .cluster h1{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:2.4rem;line-height:1;color:var(--ink);letter-spacing:.01em}
  .cluster .lede{color:var(--ink);font-size:1.05rem;max-width:74ch;margin:.6rem 0 1.75rem}
  .diagram{background:#fff;border:1px solid var(--hairline);border-radius:16px;padding:1.5rem;box-shadow:0 24px 50px -34px rgba(19,19,23,.3)}
  .diagram svg{width:100%;height:auto;display:block}
  .col-label{font:700 12px var(--font-body);letter-spacing:.12em;text-transform:uppercase;fill:#8a8a94}
  .wire{fill:none;stroke:#cfcfd6;stroke-width:2}
  .wire--crm{stroke:var(--accent);stroke-width:2;stroke-dasharray:7 6}
  .node{display:flex;flex-direction:column;justify-content:center;height:100%;padding:.5rem .75rem;border-radius:11px;
    border:1px solid var(--hairline);background:#fff;overflow:hidden}
  .node__link{text-decoration:none;display:block}
  .node--case:hover{border-color:var(--accent);box-shadow:0 12px 26px -16px rgba(19,19,23,.4)}
  .node__tag{font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-strong);font-weight:700}
  .node__title{font-size:.82rem;font-weight:700;color:var(--ink);margin-top:.1rem;line-height:1.2;display:block}
  .node__social{margin-top:.4rem;display:inline-flex;align-items:center;gap:.35rem;border:0;background:transparent;
    cursor:pointer;font:600 .66rem var(--font-body);color:var(--ink-muted);padding:0;text-decoration:none}
  .node__social:hover{color:var(--accent-strong)}
  .pf{width:15px;height:15px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;
    font-size:.56rem;font-weight:800;color:#fff}
  .pf--li{background:var(--li)} .pf--fb{background:var(--fb)} .pf--ig{background:var(--ig)}
  .node--lp{background:var(--ink);border-color:var(--ink)}
  .node--lp .node__tag{color:var(--accent)} .node--lp .node__title{color:#fff;font-size:1.05rem}
  .node--lp .node__meta{color:#b6b6c0;font-size:.7rem;margin-top:.2rem}
  .node--crm{background:var(--accent-soft);border:2px dashed var(--accent)}
  .node--crm .node__tag{color:var(--accent-strong)} .node--crm .node__title{color:var(--accent-strong);font-size:1rem}
  .node--crm .node__meta{color:#a9793f;font-size:.7rem;margin-top:.2rem}
  .legend{display:flex;flex-wrap:wrap;gap:1.5rem;margin-top:1.25rem;font-size:.82rem;color:var(--ink-muted)}
  .legend span{display:inline-flex;align-items:center;gap:.5rem}
  .swatch{width:22px;height:12px;border-radius:3px;display:inline-block}
  .cluster-note{margin-top:1.5rem;background:#fff;border:1px solid var(--hairline);border-left:3px solid var(--accent);border-radius:10px;padding:1rem 1.25rem;font-size:.9rem;color:var(--ink)}

  /* ---------- Social view ---------- */
  .social{padding:2rem 2.5rem 3rem;max-width:1320px;margin:0 auto}
  .social h1{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:2.3rem;line-height:1;color:var(--ink)}
  .social .lede{color:var(--ink-muted);font-size:.95rem;margin:.4rem 0 1.25rem}
  .filters{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:1.5rem;position:sticky;top:0;background:var(--bg);padding:.5rem 0;z-index:2}
  .chip{border:1px solid var(--hairline);background:#fff;border-radius:999px;padding:.4rem .9rem;font-size:.82rem;font-weight:700;color:var(--ink);cursor:pointer}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:.4rem;vertical-align:middle}
  .article-filter{margin-left:auto;font-size:.82rem;color:var(--ink-muted)}
  .article-filter b{color:var(--ink)}
  .article-filter a{color:var(--accent-strong);font-weight:700;cursor:pointer;margin-left:.5rem}

  .art-group{margin-bottom:2rem;border-top:1px solid var(--hairline);padding-top:1.5rem}
  .art-head{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
  .art-head img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
  .art-head .meta h3{font-size:1.05rem;color:var(--ink);line-height:1.2}
  .art-head .meta span{font-size:.78rem;color:var(--ink-muted)}
  .art-head .links{margin-left:auto;display:flex;gap:.5rem}
  .art-head .links a{font-size:.78rem;font-weight:700;color:var(--accent-strong);text-decoration:none;border:1px solid var(--hairline);padding:.35rem .7rem;border-radius:7px;cursor:pointer}
  .art-head .links a:hover{border-color:var(--accent)}

  .posts{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
  @media(max-width:1050px){.posts{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:720px){.posts{grid-template-columns:1fr}}
  .post{background:#fff;border:1px solid var(--hairline);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .post__bar{display:flex;align-items:center;gap:.55rem;padding:.7rem .9rem;border-bottom:1px solid var(--hairline)}
  .post__pf{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.8rem;flex-shrink:0}
  .post__bar b{font-size:.85rem;color:var(--ink)}
  .post__bar small{font-size:.7rem;color:var(--ink-muted);margin-left:auto}
  .post__img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#eee}
  .post.ig .post__img{aspect-ratio:1/1}
  .post__body{padding:.9rem 1rem 1.1rem;display:flex;flex-direction:column;flex:1}
  .post__cap{font-size:.86rem;line-height:1.5;color:var(--ink);white-space:pre-wrap;margin-bottom:.7rem}
  .post__tags{font-size:.78rem;color:var(--accent-strong);font-weight:600;line-height:1.6;word-break:break-word}
  .post__foot{margin-top:auto;padding-top:.7rem;font-size:.72rem;color:var(--ink-muted);border-top:1px dashed var(--hairline)}
  .post__foot b{color:var(--ink)}

  /* ---------- Meta Ads view ---------- */
  .ads{padding:2rem 2.5rem 3rem;max-width:1180px;margin:0 auto}
  .ads h1{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:2.3rem;line-height:1;color:var(--ink)}
  .ads .lede{color:var(--ink-muted);font-size:.95rem;margin:.4rem 0 1.5rem;max-width:80ch}
  .ad-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.25rem;align-items:start}
  @media(max-width:1000px){.ad-grid{grid-template-columns:1fr}}
  .ad-label{font-size:.75rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-strong);margin-bottom:.7rem}
  .ad-label.blue{color:var(--fb)}
  .fb{background:#fff;border:1px solid var(--hairline);border-radius:12px;overflow:hidden;max-width:500px;box-shadow:0 18px 40px -28px rgba(19,19,23,.35)}
  .fb__head{display:flex;align-items:center;gap:.6rem;padding:.8rem .9rem .5rem}
  .fb__avatar{width:40px;height:40px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .fb__avatar img{width:26px;height:26px;filter:brightness(0) invert(1)}
  .fb__who b{font-size:.9rem;color:#050505}
  .fb__who span{font-size:.72rem;color:#65676b}
  .fb__text{padding:0 .9rem .7rem;font-size:.88rem;line-height:1.45;color:#050505;white-space:pre-wrap}
  .fb__media img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover;background:#eee}
  .fb__link{display:flex;align-items:center;gap:.9rem;background:#f0f2f5;padding:.7rem .9rem}
  .fb__link .lk{flex:1;min-width:0}
  .fb__link .lk small{font-size:.66rem;text-transform:uppercase;color:#65676b;letter-spacing:.02em}
  .fb__link .lk b{display:block;font-size:.9rem;color:#050505;line-height:1.2;margin:.1rem 0}
  .fb__link .lk span{font-size:.76rem;color:#65676b}
  .fb__cta{background:#e4e6eb;border:0;color:#050505;font-weight:700;font-size:.8rem;padding:.55rem .9rem;border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-block}
  .fb__cta:hover{background:#d8dade}
  .fb__cta.primary{background:var(--fb);color:#fff}
  .fb__cta.primary:hover{background:#1467d0}
  .fb__react{display:flex;justify-content:space-around;border-top:1px solid var(--hairline);padding:.35rem;color:#65676b;font-size:.8rem;font-weight:600}
  .fb__react span{padding:.3rem .6rem}
  .carousel-hint{font-size:.72rem;color:#65676b;padding:0 .9rem .35rem}
  .carousel{display:flex;gap:.5rem;overflow-x:auto;padding:0 .9rem .8rem;scroll-snap-type:x mandatory}
  .carousel::-webkit-scrollbar{height:6px}
  .carousel::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
  .cc{flex:0 0 76%;scroll-snap-align:start;border:1px solid var(--hairline);border-radius:10px;overflow:hidden;background:#fff}
  .cc img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#eee}
  .cc__b{padding:.55rem .7rem .75rem}
  .cc__b .step{font-size:.64rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-strong)}
  .cc__b b{display:block;font-size:.86rem;color:#050505;margin:.15rem 0 .2rem;line-height:1.2}
  .cc__b p{font-size:.76rem;color:#65676b;line-height:1.35}
  .cc{cursor:pointer}
  .carousel-wrap{position:relative}
  .car-arrow{position:absolute;top:38%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.08);box-shadow:0 2px 10px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;color:#050505;font-size:1.2rem;
    font-weight:700;line-height:0;padding-bottom:3px;transition:opacity .15s,background .15s}
  .car-arrow:hover{background:#fff}
  .car-arrow.prev{left:1.35rem}
  .car-arrow.next{right:1.35rem}
  .car-arrow[disabled]{opacity:0;pointer-events:none}

  /* ---------- CRM view ---------- */
  .crm{padding:2rem 2.5rem 3rem;max-width:1200px;margin:0 auto}
  .crm h1{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:2.3rem;line-height:1;color:var(--ink)}
  .crm .lede{color:var(--ink-muted);font-size:.95rem;margin:.4rem 0 1.1rem;max-width:82ch}
  .stage-filter{display:flex;flex-wrap:wrap;gap:.5rem;margin:0 0 1.25rem}
  .sfil{border:1px solid var(--hairline);background:#fff;border-radius:999px;padding:.35rem .8rem;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:.45rem}
  .sfil:hover{border-color:var(--accent)}
  .sfil .n{background:var(--bg-alt);border-radius:999px;padding:.02rem .42rem;font-size:.72rem;color:var(--ink-muted)}
  .sfil.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sfil.active .n{background:rgba(255,255,255,.2);color:#fff}
  .lead-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--hairline);border-radius:12px;overflow:hidden}
  .lead-table th{text-align:left;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);padding:.7rem 1rem;border-bottom:1px solid var(--hairline);background:var(--bg-alt)}
  .lead-table td{padding:.75rem 1rem;border-bottom:1px solid var(--hairline);font-size:.88rem;color:var(--ink);vertical-align:middle}
  .lead-table tbody tr{cursor:pointer}
  .lead-table tbody tr:hover{background:var(--bg-alt)}
  .lead-table tbody tr:last-child td{border-bottom:0}
  .lead-table .nm{font-weight:700;color:var(--ink)}
  .lead-table .sub{color:var(--ink-muted);font-size:.78rem}
  .badge-stage{display:inline-block;padding:.22rem .62rem;border-radius:999px;font-size:.72rem;font-weight:800;white-space:nowrap}
  .st-new{background:#e3edfb;color:#1a5fb4}.st-contacted{background:#f6ece0;color:#c07d38}
  .st-visit{background:#efe6fb;color:#7a4bc9}.st-quoted{background:#dff3f0;color:#12897a}
  .st-won{background:#e2f6e9;color:#1a9d54}.st-lost{background:#ececed;color:#6d6d77}
  .src-pill{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:6px;background:var(--bg-alt);color:var(--ink)}
  .src-pill.paid{background:#e7f0fd;color:var(--fb)}.src-pill.social{background:#fbe9f2;color:var(--ig)}.src-pill.organic{background:#e9f2ea;color:#1a8f54}.src-pill.direct{background:#eef0f2;color:#555}
  /* drawer */
  .drawer-ov{position:fixed;inset:0;background:rgba(19,19,23,.4);display:none;z-index:100}
  .drawer-ov.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:452px;max-width:94vw;background:#fff;box-shadow:-24px 0 70px -24px rgba(0,0,0,.45);transform:translateX(100%);transition:transform .25s var(--ease);overflow:auto;z-index:101}
  .drawer.open{transform:translateX(0)}
  .drawer__top{background:var(--ink);color:#fff;padding:1.3rem 1.4rem;position:relative}
  .drawer__x{position:absolute;top:.85rem;right:1.1rem;background:transparent;border:0;color:#fff;font-size:1.2rem;cursor:pointer;line-height:1}
  .drawer__top h2{font-size:1.35rem}
  .drawer__top .who{color:#c7c7cf;font-size:.82rem;margin-top:.25rem}
  .drawer__stage{margin-top:1rem;display:flex;align-items:center;gap:.55rem}
  .drawer__stage label{font-size:.72rem;color:#9a9aa2;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .drawer__stage select{background:#22222a;color:#fff;border:1px solid #34343d;border-radius:7px;padding:.42rem .6rem;font:inherit;font-size:.84rem;font-weight:700;cursor:pointer}
  .drawer__body{padding:.4rem 1.4rem 2rem}
  .dsec{border-top:1px solid var(--hairline);padding:1.05rem 0}
  .dsec h4{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-strong);margin-bottom:.65rem}
  .drow{display:flex;justify-content:space-between;gap:1rem;padding:.26rem 0;font-size:.87rem}
  .drow .k{color:var(--ink-muted);flex-shrink:0}
  .drow .v{color:var(--ink);font-weight:600;text-align:right;word-break:break-word}
  .drow .v a{color:var(--accent-strong)}
  .drow .v.mono{font-family:var(--font-mono,ui-monospace,monospace);font-weight:500;font-size:.8rem}
  .dmsg{background:var(--bg-alt);border-radius:8px;padding:.7rem .8rem;font-size:.86rem;color:var(--ink);line-height:1.5}
  .dnotes{width:100%;min-height:96px;border:1px solid var(--hairline);border-radius:8px;padding:.6rem .7rem;font:inherit;font-size:.86rem;line-height:1.5;resize:vertical;color:var(--ink)}
  .dnote-save{margin-top:.5rem;font-size:.75rem;color:var(--ink-muted)}

  .wire--ad{fill:none;stroke:var(--fb);stroke-width:2;stroke-dasharray:2 5;stroke-linecap:round}
  /* ---------- responsive ---------- */
  .tb-menu{display:none;background:none;border:0;font-size:1.4rem;line-height:1;color:var(--ink);cursor:pointer;padding:.1rem .35rem;margin-left:-.2rem}
  .nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:125}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  @media (max-width:900px){
    body{grid-template-columns:1fr}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:min(282px,84vw);z-index:130;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
    body.nav-open .sidebar{transform:translateX(0);box-shadow:0 0 60px -8px rgba(0,0,0,.6)}
    .nav-overlay{display:block}
    body.nav-open .nav-overlay{opacity:1;pointer-events:auto}
    .tb-menu{display:inline-flex;align-items:center}
    .toolbar{padding:.6rem .9rem;gap:.55rem}
    .tb-sub{display:none}
    .tb-badge{margin-left:0}
    .tb-open{margin-left:auto;font-size:.76rem;padding:.4rem .6rem;white-space:nowrap}
    .tb-btn{display:none}
    .cluster,.social,.ads,.crm,.gbp{padding:1.4rem 1.05rem 2.5rem}
    .brief{padding:1.4rem 1.1rem 2.6rem}
    .brief h1,.cluster h1,.social h1,.ads h1,.crm h1,.gbp h1{font-size:2rem}
    .brief__lede{font-size:1.05rem}
    .diagram{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:1rem}
    .diagram svg{min-width:680px}
    .fb{max-width:100%}
    .lead-table{min-width:600px}
    .g-revsum{flex-wrap:wrap;gap:.8rem}
    .gbp-head{gap:1rem}
    .sitepane{width:min(420px,92vw)}
  }
  @media (max-width:560px){
    .tb-badge{display:none}
    .cwall{grid-template-columns:1fr}
    .brief h1,.cluster h1,.social h1,.ads h1,.crm h1,.gbp h1{font-size:1.7rem}
    .brief__lede{font-size:1rem}
    .brief__quote{font-size:1.2rem;padding:1rem 1.15rem}
    .stage-filter{flex-wrap:wrap}
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="hub-brand" id="hubBrand"></div>
  <div class="hub-proposal" id="hubProposal"></div>
  <nav class="hub-nav" id="hubNav"></nav>
  <div class="sidebar__foot" id="hubFoot"></div>
</aside>

<div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
<main class="main">
  <div class="toolbar">
    <button class="tb-menu" id="tbMenu" onclick="toggleNav()" aria-label="Open menu">&#9776;</button>
    <span class="tb-title" id="tbTitle">Intro</span>
    <span class="tb-badge" id="tbBadge" hidden>Functional prototype</span>
    <span class="tb-sub" id="tbSub">Answering your public callout for a new agency</span>
    <a class="tb-open" id="tbOpen" href="website/" target="_blank" rel="noopener">Open in new tab &#8599;</a>
    <button class="tb-btn" id="tbInfo" onclick="openSitePane()" hidden>How this improves the current site</button>
  </div>

  <section class="view" id="view-intro"></section>

  <section class="view" id="view-recs" hidden></section>

  <section class="view" id="view-who" hidden></section>

  <section class="view" id="view-people" hidden></section>

  <section class="view" id="view-website" hidden></section>

  <div class="sitepane-overlay" id="sitePaneOverlay" onclick="closeSitePane()"></div>
  <aside class="sitepane" id="sitePane" aria-hidden="true" aria-label="How this website improves on the current site">
    <div class="sitepane__top"><b>Website: a functional prototype</b><button class="sitepane__x" onclick="closeSitePane()" aria-label="Close">&times;</button></div>
    <div class="sitepane__body" id="sitePaneBody"></div>
  </aside>

  <section class="view" id="view-cluster" hidden></section>

  <section class="view" id="view-social" hidden>
    <div class="social">
      <h1 id="socialHeading">Social hub</h1>
      <p class="lede" id="socialLede"></p>
      <div class="filters">
        <span class="chip active" data-pf="all" onclick="setPlatform('all')">All platforms</span>
        <span id="pfChips"></span>
        <span class="article-filter" id="artFilter"></span>
      </div>
      <div id="socialContent"></div>
    </div>
  </section>

  <section class="view" id="view-ads" hidden></section>

  <section class="view" id="view-gbp" hidden></section>

  <section class="view" id="view-tp" hidden></section>

  <section class="view" id="view-crm" hidden>
    <div class="crm">
      <h1 id="crmHeading">Leads &amp; pipeline</h1>
      <p class="lede" id="crmLede"></p>
      <div class="stage-filter" id="stageFilter"></div>
      <div id="crmList"></div>
    </div>
    <div class="drawer-ov" id="drawerOv" onclick="closeCrmLead()"></div>
    <aside class="drawer" id="crmDrawer" aria-hidden="true"><div id="drawerContent"></div></aside>
  </section>
</main>

<script src="content.js"></script>
<script>
  /* ===== proposal-hub engine v2 — chassis-config: build shell from window.HUB =====
     The chassis is generic. Everything agency- or pitch-specific arrives through
     HUB (validated against content.schema.json). See FEATURE.md + the v2 decision. */
  window.PROPOSAL_HUB_CHASSIS = "2.0.0";
  var WEB=HUB.WEB, PF=HUB.PF, DATA=HUB.social, VIEWS=HUB.VIEWS, STAGES=HUB.STAGES, CRM=HUB.leads, GBP=HUB.gbp, TP=HUB.tp, CLIENTS=HUB.clients;
  var AGENCY = HUB.agency || {};

  // Agency branding is pure config: colour tokens, fonts, logo, org name, language.
  // config token key -> CSS custom property the chassis reads.
  var TOKEN_VARS = { accent:"--accent", accentStrong:"--accent-strong", accentSoft:"--accent-soft",
    ink:"--ink", ink2:"--ink-2", inkMuted:"--ink-muted", sidebar:"--sidebar", bg:"--bg",
    bgAlt:"--bg-alt", hairline:"--hairline", onDark:"--on-dark" };
  function applyAgency(){
    var root=document.documentElement;
    if(AGENCY.lang) root.setAttribute("lang", AGENCY.lang);
    var t=AGENCY.tokens||{};
    Object.keys(TOKEN_VARS).forEach(function(k){ if(t[k]!=null) root.style.setProperty(TOKEN_VARS[k], t[k]); });
    var f=AGENCY.fonts||{};
    if(f.display) root.style.setProperty("--font-display", f.display);
    if(f.body) root.style.setProperty("--font-body", f.body);
    if(f.import){ var fl=document.createElement("link"); fl.rel="stylesheet"; fl.href=f.import; document.head.appendChild(fl); }
    var fav=AGENCY.favicon||HUB.favicon;
    var lk=document.querySelector('link[rel="icon"]'); if(lk&&fav) lk.href=fav;
    var org=AGENCY.org||AGENCY.name||"";
    document.title = HUB.title || ("Proposal for "+HUB.brand.proposalFor+(org?" · "+org:""));
    // Sidebar brand: logo (inline SVG string OR {src}) + name + unit, all from config.
    var logo="";
    if(AGENCY.logo){ logo = typeof AGENCY.logo==="string"
      ? '<span class="brand-mark">'+AGENCY.logo+'</span>'
      : '<span class="brand-mark"><img src="'+AGENCY.logo.src+'" alt="'+esc(org)+'"></span>'; }
    document.getElementById("hubBrand").innerHTML = logo
      + '<div>'+(AGENCY.name?'<b>'+esc(AGENCY.name)+'</b>':'')+(AGENCY.unit?'<span>'+esc(AGENCY.unit)+'</span>':'')+'</div>';
  }
  (function(){
    applyAgency();
    document.getElementById("hubProposal").innerHTML = "Proposal for <b>"+HUB.brand.proposalFor+"</b>";
    document.getElementById("hubFoot").innerHTML = HUB.brand.foot;
    var nav=document.getElementById("hubNav"), h="";
    HUB.nav.forEach(function(sec){
      h+='<p class="hub-section">'+sec.section+"</p>";
      sec.items.forEach(function(it){
        h+='<a class="hub-item" data-view="'+it.view+'">'+(it.icon||"")+" "+it.label+(it.badge!=null?' <span class="badge">'+it.badge+"</span>":"")+"</a>";
      });
    });
    nav.innerHTML=h;
    // Auto-create a <section> for any nav view that has no shell in the chassis,
    // so a new view is added from config alone (no HTML edit).
    var main=document.querySelector('main.main')||document.querySelector('main');
    HUB.nav.forEach(function(sec){ sec.items.forEach(function(it){
      if(!document.getElementById("view-"+it.view)){
        var s=document.createElement("section"); s.className="view"; s.id="view-"+it.view; s.hidden=true; main.appendChild(s);
      }
    }); });
    // Inject html-only (static/editorial) view content.
    Object.keys(HUB.html).forEach(function(k){
      var el=document.getElementById("view-"+k); if(el) el.innerHTML=HUB.html[k];
    });
    // Optional website info-pane body (config-driven; per-pitch).
    if(HUB.sitepane){ var sp=document.getElementById("sitePaneBody"); if(sp) sp.innerHTML=HUB.sitepane; }
  })();


  var state = {platform:"all", article:null};

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  function postCard(a, key){
    var p = a.posts[key], m = PF[key];
    if(!p || !m) return '';
    var tags = p.tags.length ? '<div class="post__tags">'+p.tags.map(esc).join(' ')+'</div>' : '';
    return '<div class="post '+m.cls+'">'
      + '<div class="post__bar"><span class="post__pf" style="background:var(--'+m.cls+')">'+m.tag+'</span><b>'+m.name+'</b><small>maps to article</small></div>'
      + '<img class="post__img" src="'+a.img+'" alt="'+esc(a.title)+'">'
      + '<div class="post__body"><div class="post__cap">'+esc(p.cap)+'</div>'+tags
      + '<div class="post__foot"><b>'+esc(a.title)+'</b> &middot; '+esc(a.location)+'</div></div></div>';
  }

  // Platforms actually present in the data, in PF-declared order (not hardcoded).
  function socialPlatforms(){
    return Object.keys(PF).filter(function(k){
      return DATA.some(function(a){ return a.posts && a.posts[k]; });
    });
  }
  function renderSocial(){
    var present = socialPlatforms();
    var meta = HUB.socialMeta || {};
    document.getElementById('socialHeading').textContent = meta.heading || (VIEWS.social && VIEWS.social.title) || 'Social hub';
    var allChip = document.querySelector('.filters .chip[data-pf="all"]');
    if(allChip){ allChip.textContent = meta.allLabel || 'All platforms'; }
    var postCount = DATA.reduce(function(n,a){ return n + (a.posts ? Object.keys(a.posts).length : 0); }, 0);
    document.getElementById('socialLede').innerHTML = meta.lede
      || (postCount+' posts &middot; '+DATA.length+' case stud'+(DATA.length===1?'y':'ies')+' &middot; '+present.length+' platform'+(present.length===1?'':'s'));
    document.getElementById('pfChips').innerHTML = present.map(function(k){
      return '<span class="chip" data-pf="'+k+'" onclick="setPlatform(\''+k+'\')"><span class="dot" style="background:var(--'+PF[k].cls+', #8a8f98)"></span>'+esc(PF[k].name)+'</span>';
    }).join('');
    document.querySelectorAll('.filters .chip').forEach(function(c){ c.classList.toggle('active', c.getAttribute('data-pf')===state.platform); });

    var arts = state.article ? DATA.filter(function(a){return a.slug===state.article}) : DATA;
    var keys = state.platform==="all" ? present : [state.platform];
    var html = arts.map(function(a){
      var pk = keys.filter(function(k){ return a.posts && a.posts[k]; });
      var cards = pk.map(function(k){return postCard(a,k)}).join('');
      return '<div class="art-group"><div class="art-head"><img src="'+a.img+'" alt=""><div class="meta"><h3>'+esc(a.title)+'</h3><span>Case study &middot; '+esc(a.location)+' &middot; '+pk.length+' post'+(pk.length===1?'':'s')+'</span></div>'
        + '<div class="links"><a href="'+a.article+'" target="_blank" rel="noopener">View article &#8599;</a><a onclick="gotoCluster()">In cluster</a></div></div>'
        + '<div class="posts">'+cards+'</div></div>';
    }).join('');
    document.getElementById('socialContent').innerHTML = html;
    var af = document.getElementById('artFilter');
    af.innerHTML = state.article ? ('Filtered to <b>'+esc(arts[0].title)+'</b><a onclick="clearArticle()">show all articles</a>') : '';
  }
  function setPlatform(pf){
    state.platform = pf;
    renderSocial();
  }
  function clearArticle(){ state.article=null; renderSocial(); }
  function gotoCluster(){ switchView('cluster'); }
  function showSocial(slug){ state.article=slug; switchView('social'); renderSocial(); }

  function showAds(){ switchView('ads'); }

  // ---------- CRM ----------
  // Stage order is the key order of HUB.STAGES (one source of truth; JS preserves
  // insertion order). No duplicated array to drift out of sync.
  var STAGE_ORDER = Object.keys(STAGES);
  var crmState = {stage:"all"};
  function showCrm(){ switchView('crm'); }
  function badge(st){ return '<span class="badge-stage '+STAGES[st]+'">'+st+'</span>'; }
  function setCrmFilter(s){ crmState.stage=s; renderCrm(); }
  function renderCrm(){
    var meta = HUB.crmMeta || {};
    document.getElementById('crmHeading').textContent = meta.heading || (VIEWS.crm && VIEWS.crm.title) || 'Leads & pipeline';
    document.getElementById('crmLede').innerHTML = meta.lede
      || 'Every enquiry captured with source, attribution, the converting page and pipeline stage. Click a lead to open it.';
    var counts={}; CRM.forEach(function(l){counts[l.stage]=(counts[l.stage]||0)+1;});
    var fil='<span class="sfil '+(crmState.stage==="all"?"active":"")+'" onclick="setCrmFilter(\'all\')">All <span class="n">'+CRM.length+'</span></span>';
    STAGE_ORDER.forEach(function(s){ if(counts[s]) fil+='<span class="sfil '+(crmState.stage===s?"active":"")+'" onclick="setCrmFilter(\''+s+'\')">'+s+' <span class="n">'+counts[s]+'</span></span>'; });
    document.getElementById('stageFilter').innerHTML=fil;
    var rows=CRM.filter(function(l){return crmState.stage==="all"||l.stage===crmState.stage;}).map(function(l){
      return '<tr onclick="openCrmLead(\''+l.id+'\')"><td><div class="nm">'+esc(l.name)+'</div><div class="sub">'+esc(l.email)+'</div></td>'
        +'<td>'+esc(l.projectType)+'</td><td><span class="src-pill '+l.srcKind+'">'+esc(l.srcShort)+'</span></td>'
        +'<td>'+badge(l.stage)+'</td><td class="sub">'+esc(l.date)+'</td></tr>';
    }).join('');
    document.getElementById('crmList').innerHTML='<div class="table-scroll"><table class="lead-table"><thead><tr><th>Lead</th><th>Project</th><th>Source</th><th>Stage</th><th>Received</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  function stageOptions(cur){ return STAGE_ORDER.map(function(s){return '<option'+(s===cur?' selected':'')+'>'+s+'</option>';}).join(''); }
  function drow(k,v,cls){ return '<div class="drow"><span class="k">'+k+'</span><span class="v '+(cls||'')+'">'+v+'</span></div>'; }
  function openCrmLead(id){
    var l=CRM.find(function(x){return x.id===id;}); if(!l) return; var u=l.utm;
    var pg = l.pageUrl ? '<a href="'+l.pageUrl+'" target="_blank" rel="noopener">'+esc(l.page)+'</a>' : esc(l.page);
    var html='<div class="drawer__top"><button class="drawer__x" onclick="closeCrmLead()">&#10005;</button>'
      +'<h2>'+esc(l.name)+'</h2><div class="who">'+esc(l.id)+' &middot; '+esc(l.postcode)+'</div>'
      +'<div class="drawer__stage"><label>Stage</label><select onchange="setStage(\''+l.id+'\',this.value)">'+stageOptions(l.stage)+'</select></div></div>'
      +'<div class="drawer__body">'
      +'<div class="dsec"><h4>Contact</h4>'+drow('Email','<a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a>')+drow('Phone','<a href="tel:'+esc(l.phone.replace(/\s/g,''))+'">'+esc(l.phone)+'</a>')+drow('Postcode',esc(l.postcode))+'</div>'
      +'<div class="dsec"><h4>Project</h4>'+drow('Type',esc(l.projectType))+drow('Ideal start',esc(l.idealStart))+'<div style="margin-top:.5rem"><div class="dmsg">'+esc(l.message)+'</div></div></div>'
      +'<div class="dsec"><h4>Attribution</h4>'+drow('Converted on',pg)+drow('utm_source',esc(u.source),'mono')+drow('utm_medium',esc(u.medium),'mono')+drow('utm_campaign',esc(u.campaign),'mono')+drow('utm_content',esc(u.content),'mono')+drow('utm_term',esc(u.term),'mono')+drow('Received',esc(l.date))+'</div>'
      +'<div class="dsec"><h4>Notes</h4><textarea class="dnotes" onchange="saveNote(\''+l.id+'\',this.value)">'+esc(l.notes)+'</textarea><div class="dnote-save">Notes saved to this lead (preview &mdash; in-memory).</div></div>'
      +'</div>';
    document.getElementById('drawerContent').innerHTML=html;
    document.getElementById('crmDrawer').classList.add('open');
    document.getElementById('drawerOv').classList.add('open');
  }
  function closeCrmLead(){ document.getElementById('crmDrawer').classList.remove('open'); document.getElementById('drawerOv').classList.remove('open'); }
  function setStage(id,val){ var l=CRM.find(function(x){return x.id===id;}); if(l){ l.stage=val; renderCrm(); } }
  function saveNote(id,val){ var l=CRM.find(function(x){return x.id===id;}); if(l) l.notes=val; }

  // Mount-point contract: a data-driven view's editorial HTML contains exactly one
  // <div data-hub-mount></div> where its mockup renders. One convention for all
  // data views (gbp/tp/who); no renderer-specific ids.
  function mountEl(v){ return document.querySelector('#view-'+v+' [data-hub-mount]'); }
  // Filled/hollow star glyph string from a rating (default 5, clamped 0..5).
  function starStr(n){ n=Math.max(0,Math.min(5,Math.round(n==null?5:n))); return '★★★★★☆☆☆☆☆'.slice(5-n,10-n); }
  // Rating-distribution bars from a config `dist:[{s,p}]` array (5→1). Shared shape
  // between GBP and Trustpilot; both supply their own data, none is hardcoded.
  function distBars(dist,cls){ return (dist||[]).map(function(d){
    return '<div class="'+cls+'"><span class="lab">'+d.s+(cls==='g-bar'?'':'-star')+'</span><span class="track"><span class="fill" style="width:'+d.p+'%"></span></span>'+(cls==='g-bar'?'':'<span class="pct">'+d.p+'%</span>')+'</div>'; }).join(''); }

  // ---------- Google Business Profile ----------
  function showGbp(){ switchView('gbp'); }
  function renderGbp(){
    var mount=mountEl('gbp'); if(!GBP||!mount) return;
    var gname = GBP.name || (HUB.brand&&HUB.brand.proposalFor) || "Business";
    // Images are paths in the data (like social[].img); the chassis owns no asset root.
    var strip=(GBP.photos||[]).map(function(src){return '<img src="'+esc(src)+'" alt="'+esc(gname)+'">';}).join('');
    var acts=[["🧭","Directions"],["🔖","Save"],["🌐","Website"],["📞","Call"],["↗","Share"]].map(function(a){return '<div class="g-act"><span class="ic2">'+a[0]+'</span>'+a[1]+'</div>';}).join('');
    function grow(ic,inner){ return inner?('<div class="row"><span class="gi">'+ic+'</span>'+inner+'</div>'):''; }
    var head='<div class="gcard gbp-head"><div class="gbp-head__main">'
      +'<h3>'+esc(gname)+'</h3>'
      +'<div class="g-rating"><b>'+esc(GBP.rating)+'</b><span class="g-stars">'+starStr(GBP.rating)+'</span><a>'+esc(GBP.reviewCount)+' Google reviews</a></div>'
      +(GBP.category?'<div class="g-cat">'+esc(GBP.category)+'</div>':'')
      +'<div class="g-actions">'+acts+'</div>'
      +'<div class="g-info">'
        +grow('📍', GBP.address?esc(GBP.address):'')
        +grow('🕒', GBP.hours?('<span><span class="open">Open</span> &middot; '+esc(GBP.hours)+'</span>'):'')
        +grow('📞', GBP.phone?'<a>'+esc(GBP.phone)+'</a>':'')
        +grow('🌐', GBP.website?'<a>'+esc(GBP.website)+'</a>':'')
        +grow('✓', GBP.attrs?esc(GBP.attrs):'')
      +'</div></div><div class="gbp-head__photos">'+strip+'</div></div>';
    var pal=["#c5221f","#1a73e8","#188038","#e37400","#7c3aed","#0b8043"];
    var revs=(GBP.reviews||[]).map(function(r,i){
      return '<div class="g-rev"><div class="g-rev__top"><div class="g-av" style="background:'+pal[i%pal.length]+'">'+esc(r.author[0])+'</div>'
        +'<div class="g-rev__who"><b>'+esc(r.author)+'</b><span>Local Guide &middot; '+esc(r.when)+'</span></div></div>'
        +'<div class="g-rev__stars">'+starStr(r.rating)+'</div><div class="g-rev__text">'+esc(r.text)+'</div>'
        +(r.ownerReply?'<div class="g-reply"><b>Response from the owner</b><span>'+esc(r.when)+'</span><p>'+esc(r.ownerReply)+'</p></div>':'')+'</div>';
    }).join('');
    var revsec='<div class="g-sec"><div class="g-sec__h"><h4>Reviews</h4><span class="more">Write a review</span></div>'
      +'<div class="g-revsum"><div class="big">'+esc(GBP.rating)+'<span class="s">'+starStr(GBP.rating)+'</span><span class="c">'+esc(GBP.reviewCount)+' reviews</span></div>'
      +'<div class="bars">'+distBars(GBP.dist,'g-bar')+'</div></div>'
      +revs+'</div>';
    var posts=(GBP.posts||[]).map(function(p){
      return '<div class="g-post">'+(p.img?'<img src="'+esc(p.img)+'" alt="">':'')
        +'<div class="g-post__b"><span class="g-post__type">'+esc(p.type)+'</span><b>'+esc(p.title)+'</b><p>'+esc(p.body)+'</p><span class="g-post__cta">'+esc(p.cta)+' &rarr;</span></div></div>';
    }).join('');
    var postsec='<div class="g-sec"><div class="g-sec__h"><h4>Updates</h4><span class="more">View all</span></div><div class="g-posts">'+posts+'</div></div>';
    var prods=(GBP.products||[]).map(function(p){
      return '<div class="g-prod">'+(p.img?'<img src="'+esc(p.img)+'" alt="">':'')+'<div class="g-prod__b"><b>'+esc(p.name)+'</b><div class="price">'+esc(p.price)+'</div><p>'+esc(p.desc)+'</p></div></div>';
    }).join('');
    var prodsec='<div class="g-sec"><div class="g-sec__h"><h4>Products and services</h4><span class="more">View all</span></div><div class="g-prods">'+prods+'</div></div>';
    var qas=(GBP.qa||[]).map(function(q){
      return '<div class="g-qa"><div class="g-qa__q"><span class="qm">Q</span>'+esc(q.q)+'</div><div class="g-qa__a"><span class="badge-o">Owner</span><span>'+esc(q.a)+'</span></div></div>';
    }).join('');
    var qasec='<div class="g-sec"><div class="g-sec__h"><h4>Questions and answers</h4><span class="more">See all questions</span></div>'+qas+'</div>';
    mount.innerHTML=head+revsec+postsec+prodsec+qasec;
  }

  // ---------- Trustpilot ----------
  function tpStars(n, sm){ n=Math.round(n||0); var s=''; for(var i=1;i<=5;i++){ s+='<span class="tpsq'+(sm?' sm':'')+(i>n?' off':'')+'">&#9733;</span>'; } return '<span class="tp-stars">'+s+'</span>'; }
  function renderTp(){
    var mount=mountEl('tp'); if(!TP||!mount) return;
    var pal=["#1a73e8","#c5221f","#188038","#e37400","#7c3aed"];
    var tname = TP.name || (HUB.brand&&HUB.brand.proposalFor) || "Business";
    var head='<div class="tp-head"><h3>'+esc(tname)+'</h3>'
      +(TP.domain?'<a class="tp-domain" href="https://www.trustpilot.com/review/'+esc(TP.domain)+'" target="_blank" rel="noopener">'+esc(TP.domain)+'</a>':'')
      +'<div class="tp-score">'+tpStars(TP.score)+'<span class="tp-trustscore">TrustScore <b>'+esc(TP.score)+'</b></span></div>'
      +'<div class="tp-meta"><b>'+esc(TP.label)+'</b> &middot; based on <b>'+esc(TP.reviewCount)+'</b> reviews</div>'
      +'<div class="tp-verified">&#10003; Verified company profile</div></div>';
    var distsec='<div class="tp-sec"><div class="tp-sec__h">Rating distribution</div><div class="tp-dist">'+distBars(TP.dist,'tp-drow')+'</div></div>';
    var revs=(TP.reviews||[]).map(function(r,i){
      return '<div class="tp-rev"><div class="tp-rev__top"><div class="tp-av" style="background:'+pal[i%pal.length]+'">'+esc(r.author[0])+'</div>'
        +'<div class="tp-rev__who"><b>'+esc(r.author)+'</b><span>'+esc(String(r.nrev))+(r.nrev===1?' review':' reviews')+' &middot; '+esc(r.loc)+'</span></div>'
        +'<span class="tp-rev__meta">'+esc(r.when)+'</span></div>'
        +tpStars(r.rating,true)
        +'<b class="tp-rev__title">'+esc(r.title)+'</b>'
        +'<p class="tp-rev__body">'+esc(r.body)+'</p>'
        +'<span class="tp-doe">Date of experience: '+esc(r.doe)+'</span>'
        +(r.reply?'<div class="tp-reply"><b>Reply from '+esc(tname)+'</b><span>'+esc(r.when)+'</span><p>'+esc(r.reply)+'</p></div>':'')
        +'</div>';
    }).join('');
    var revsec='<div class="tp-sec"><div class="tp-sec__h">Recent reviews</div>'+revs+'</div>';
    mount.innerHTML=head+distsec+revsec;
  }

  // ---------- Who we are: client wall ----------
  function renderWho(){
    var mount=mountEl('who'); if(!mount) return;
    var html=(CLIENTS||[]).map(function(c){
      // logo is a path in the data (or omitted for a text mark); no asset root here.
      var mark = c.logo ? '<img class="ctile__img" src="'+esc(c.logo)+'" alt="'+esc(c.name)+'">' : '<div class="ctile__logo">'+esc(c.name)+'</div>';
      var body;
      if(c.desc || c.did){
        body = (c.desc ? '<div class="ctile__desc">'+esc(c.desc)+'</div>' : '')
             + (c.did ? '<div class="ctile__scope"><span class="ctile__lbl">What we did</span>'+esc(c.did)+'</div>' : '');
      } else {
        body = '<div class="ctile__did pending">Engagement to be confirmed</div>';
      }
      return '<div class="ctile"><div class="ctile__mark">'+mark+'</div>'+body+'</div>';
    }).join('');
    mount.innerHTML=html;
  }
  function carEl(){ return document.querySelector('#view-ads .carousel'); }
  function carStep(){ var car=carEl(); var cc=car.querySelector('.cc'); return cc.getBoundingClientRect().width + 8; }
  function carScroll(dir){ carEl().scrollBy({left:dir*carStep(), behavior:'smooth'}); }
  function updateArrows(){ var car=carEl(); if(!car) return;
    var p=document.querySelector('.car-arrow.prev'), n=document.querySelector('.car-arrow.next');
    if(p) p.toggleAttribute('disabled', car.scrollLeft<=18);
    if(n) n.toggleAttribute('disabled', car.scrollLeft>=car.scrollWidth-car.clientWidth-18); }
  function ccClick(cc){ var car=cc.parentElement; var cr=car.getBoundingClientRect(), r=cc.getBoundingClientRect();
    if(r.right>cr.right+2 || r.left<cr.left-2){ car.scrollBy({left:r.left-cr.left, behavior:'smooth'}); } }
  function initCarousel(){ var car=carEl(); if(!car) return; var img=car.querySelector('.cc img');
    var place=function(){ var h=img.getBoundingClientRect().height; if(h>10){ document.querySelectorAll('#view-ads .car-arrow').forEach(function(a){a.style.top=(h/2)+'px'}); } updateArrows(); };
    place(); setTimeout(place,90); if(img){ img.addEventListener('load', place); }
    if(!car._wired){ car.addEventListener('scroll', updateArrows); window.addEventListener('resize', place); car._wired=true; } }
  function toggleNav(){ document.body.classList.toggle('nav-open'); }
  function closeNav(){ document.body.classList.remove('nav-open'); }
  function openSitePane(){ document.getElementById('sitePane').classList.add('open'); document.getElementById('sitePaneOverlay').classList.add('open'); }
  function closeSitePane(){ var p=document.getElementById('sitePane'); if(p){ p.classList.remove('open'); document.getElementById('sitePaneOverlay').classList.remove('open'); } }
  function openLead(){ document.getElementById('leadOverlay').classList.add('open'); }
  function closeLead(){ document.getElementById('leadOverlay').classList.remove('open'); }
  function submitLead(e){
    e.preventDefault();
    var who=(HUB.brand&&HUB.brand.proposalFor)||"The team";
    document.getElementById('leadBody').innerHTML =
      '<div class="done"><div class="tick">&#10003;</div><h3 style="text-align:center;color:var(--ink)">Thanks, your enquiry is in.</h3>'
      + '<p style="text-align:center;color:var(--ink-muted);font-size:.85rem;margin-top:.4rem">'+who+' will be in touch within one business day.</p>'
      + '<div class="crm-flag"><strong>&#9670; This is a preview.</strong> On a live campaign, this lead is captured natively inside the ad platform and flows straight into the <strong>CRM</strong>, the connection shown in the Content Cluster.</div></div>';
  }
  /* ===== View-type registry (open/closed) =====================================
     Each view has a TYPE that decides how it mounts. To add a NEW KIND of service
     view, register one function here and set VIEWS[key].type in content.js — no
     other chassis edit needed. 'static' = html-only (content lives in HUB.html). */
  var VIEW_TYPES = {
    static:  function(){},                    // intro / recs / people / website / cluster
    social:  function(){ renderSocial(); },
    ads:     function(){ setTimeout(initCarousel, 40); },
    gbp:     function(){ renderGbp(); },
    tp:      function(){ renderTp(); },
    crm:     function(){ renderCrm(); },
    clients: function(){ renderWho(); },       // the "who we are" client wall
  };
  function viewType(v){
    var meta = VIEWS[v] || {};
    if(meta.type) return meta.type;            // explicit override (new services)
    if(VIEW_TYPES[v]) return v;                // built-in types share the view key
    if(v==='who') return 'clients';
    return 'static';                           // any html-only view, incl. new ones
  }
  function switchView(v){
    document.querySelectorAll('.hub-item[data-view]').forEach(function(x){x.classList.toggle('active', x.getAttribute('data-view')===v)});
    document.querySelectorAll('main .view').forEach(function(s){ s.hidden = (s.id !== 'view-'+v); });
    var mount = VIEW_TYPES[viewType(v)]; if(mount) mount(v);
    var meta = VIEWS[v] || {};
    document.getElementById('tbTitle').textContent = meta.title || v;
    document.getElementById('tbSub').textContent = meta.sub || '';
    var o=document.getElementById('tbOpen');
    if(meta.open){ o.hidden=false; o.href=meta.open; o.textContent=meta.openLabel||'Open ↗'; } else { o.hidden=true; }
    var badge=document.getElementById('tbBadge');
    badge.hidden = !meta.tbBadge; if(meta.tbBadge){ badge.textContent = meta.tbBadge; }
    document.getElementById('tbInfo').hidden = !meta.infoPane;
    if(!meta.infoPane) closeSitePane();
  }
  document.querySelectorAll('.hub-item[data-view]').forEach(function(it){
    it.addEventListener('click', function(){ switchView(it.getAttribute('data-view')); closeNav(); });
  });
  renderSocial();

  // Deep-linking: #<view> lands on that view; #<view>=<param> also hands the
  // param to a handler registered in VIEW_ROUTES. Views without a handler
  // (including any new one added in content.js) just switch — no chassis edit.
  var VIEW_ROUTES = {
    social: function(slug){ if(slug){ showSocial(slug); } else { switchView('social'); } },
  };
  function applyHashRoute(){
    var h = decodeURIComponent((location.hash || '').replace(/^#/, ''));
    if(!h){ switchView('intro'); return; }
    var eq = h.indexOf('='); var view = eq > -1 ? h.slice(0, eq) : h; var param = eq > -1 ? h.slice(eq + 1) : '';
    if(VIEW_ROUTES[view]){ VIEW_ROUTES[view](param); return; }
    if(VIEWS[view]){ switchView(view); }
  }
  applyHashRoute();
  window.addEventListener('hashchange', applyHashRoute);
</script>
<!-- brand-mark override: the Prota Studios logo is a wide wordmark PNG; show it at
     natural width and invert it to white on the dark sidebar. -->
<style>
  .hub-brand .brand-mark{width:auto;height:auto}
  .hub-brand .brand-mark img{height:19px;width:auto;filter:brightness(0) invert(1);opacity:.95}
</style>

     "Comments" button until ?review=1. Config global + labels in review.config.js. -->
<script src="review.config.js"></script>
<script src="review-bootstrap.js"></script>
